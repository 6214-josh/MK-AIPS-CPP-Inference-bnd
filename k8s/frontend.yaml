apiVersion: apps/v1
kind: Deployment
metadata:
  name: aips-frontend
  namespace: default
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: aips-frontend
  template:
    metadata:
      labels:
        app: aips-frontend
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: frontend
          image: 192.168.1.113:30002/mk-apis/frontend:v2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.4.2
          imagePullPolicy: IfNotPresent
          args:
            - "-nginx.scrape-uri=http://127.0.0.1/nginx_status"
          ports:
            - name: metrics
              containerPort: 9113
---
apiVersion: v1
kind: Service
metadata:
  name: aips-frontend-service
  namespace: default
  labels:
    app: aips-frontend
spec:
  type: NodePort
  selector:
    app: aips-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
    - name: metrics
      port: 9113
      targetPort: metrics
